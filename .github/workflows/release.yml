name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Build Release APK
      run: ./gradlew assembleRelease
      
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
    - name: Rename APKs with version
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/SAPS-${{ steps.get_version.outputs.VERSION }}-debug.apk
        mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/SAPS-${{ steps.get_version.outputs.VERSION }}-release-unsigned.apk
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: SAPS-debug-${{ steps.get_version.outputs.VERSION }}
        path: app/build/outputs/apk/debug/SAPS-${{ steps.get_version.outputs.VERSION }}-debug.apk
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: SAPS-release-${{ steps.get_version.outputs.VERSION }}
        path: app/build/outputs/apk/release/SAPS-${{ steps.get_version.outputs.VERSION }}-release-unsigned.apk

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
    - name: Download Debug APK
      uses: actions/download-artifact@v4
      with:
        name: SAPS-debug-${{ steps.get_version.outputs.VERSION }}
        path: ./artifacts/debug/
        
    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: SAPS-release-${{ steps.get_version.outputs.VERSION }}
        path: ./artifacts/release/
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: false
        files: |
          ./artifacts/debug/*.apk
          ./artifacts/release/*.apk
        body: |
          ## SAPS ${{ steps.get_version.outputs.VERSION }}
          
          ### Downloads
          - **Debug APK**: For testing and development
          - **Release APK**: Unsigned release build (sign required before distribution)
          
          ### Installation
          1. Download the APK file
          2. Enable "Install from Unknown Sources" in Android settings
          3. Install the APK on your Android device
          4. Launch SAPS and configure your proxy settings
          
          ### Requirements
          - Android 7.0+ (API 24+)
          - WiFi connection for proxy access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
